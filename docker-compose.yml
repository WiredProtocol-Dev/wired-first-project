version: '3.8'

services:
  web_services:
    build: .
    ports:
      - "8080:80"
    container_name: my_cool_nginx
    volumes:
      - .:/usr/share/nginx/html
    depends_on:
      - db_server

  db_server:
    image: postgres:alpine
    container_name: my_database
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
